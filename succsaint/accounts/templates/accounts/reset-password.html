{% extends "base.html" %}

{% block content %}

<section class="section-conten padding-y" style="min-height:84vh">

<div class="card mx-auto" style="max-width: 380px; margin-top:100px;">
      <div class="card-body">
        <div style="min-height: 40px;">
        {% include 'includes/alerts.html' %}
        </div>
      <h4 class="card-title mb-4"> Reset Password </h4>
      <form action="{% url 'reset_password' uidb64 token %}" method="POST">
          {% csrf_token %}
          <div class="form-group">
			 <input type="password" class="form-control" placeholder="Create New Password" name="password">
          </div> <!-- form-group// -->
          <div class="form-group">
			<input type="password" class="form-control" placeholder="Confirm New Password" name="confirm_password">
          </div> <!-- form-group// -->
              
              <div class="form-group">
              	<a href="{% url 'login' %}" class="float-right" text-center> Remember Password? Login</a> 
              
              </div> <!-- form-group form-check .// -->
          <div class="form-group">
              <button type="submit" class="btn btn-primary btn-block"> reset  </button>
          </div> <!-- form-group// -->    
      </form>
      </div> <!-- card-body.// -->

</section>
{% endblock %}
